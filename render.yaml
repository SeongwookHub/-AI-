services:
  - type: web
    name: naver-news-dashboard
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
