<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 뉴스 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="login-overlay" class="login-overlay" hidden>
    <form id="login-form" class="login-box">
      <h2>🔒 비밀번호 입력</h2>
      <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" autofocus />
      <button type="submit">입장</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <h2>관심 종목</h2>
      <div id="add-keyword-form">
        <div class="search-box">
          <input type="text" id="new-keyword-input" placeholder="종목명 또는 종목코드 검색" autocomplete="off" />
          <ul id="stock-suggestions" class="suggestions" hidden></ul>
        </div>
        <div class="search-actions">
          <button type="button" id="search-button" class="secondary-btn">검색</button>
          <button type="button" id="add-button">추가</button>
        </div>
      </div>
      <p id="keyword-error" class="error"></p>
      <ul id="keyword-list" class="keyword-list"></ul>
    </aside>

    <main class="content">
      <header class="content-header">
        <h1>📈 주식 뉴스 대시보드</h1>
        <div class="sync-bar">
          <button id="sync-button">🔄 지금 업데이트</button>
          <span id="last-sync" class="muted"></span>
        </div>
        <p id="sync-message"></p>
      </header>

      <nav id="keyword-tabs" class="tabs"></nav>
      <section id="stock-panel" class="stock-panel" hidden></section>
      <section id="article-list" class="article-list"></section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
